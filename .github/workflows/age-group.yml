name: Age-Group Performance (daily, 12 PM IST)

# Fires once a day at 06:30 UTC = 12:00 IST. Pulls month-to-date account-level
# Meta insights for all 3 portals broken down by age bracket, and writes Spend /
# Purchases / Revenue / ROAS per age group to a new `Age YYYY-MM-DD` tab in the
# operator's sheet (18shZsLz…, same sheet as the top-states report).
# See scripts/v2/age_group_sheet.py.
#
# Note: GHA cron is best-effort — a delayed firing can land 10–30 min late under
# heavy queue load. Fine for a daily operator-facing snapshot.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: age-group-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/google-service-account.json
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load ad account IDs
        run: grep -E '^[A-Z][A-Z0-9_]*=' config/accounts.env >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$GOOGLE_SERVICE_ACCOUNT_FILE"
          chmod 600 "$GOOGLE_SERVICE_ACCOUNT_FILE"

      - name: Build + push Age-Group Performance to the sheet
        run: python3 scripts/v2/age_group_sheet.py
