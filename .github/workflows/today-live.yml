name: Today's Live Report (hourly, IST business hours)

on:
  schedule:
    # Fires at HH:05, HH:20, HH:35, HH:50 UTC = IST :35, :50, :05, :20.
    # The :20 UTC firing = IST :50 of the previous hour — operator's preferred
    # check time (data fresh ~10 min before each hour ticks). 4 attempts/hour
    # so even at GHA's ~30% cron reliability, we land at least one near :50.
    - cron: "5,20,35,50 4-14 * * *"
  workflow_dispatch:

concurrency:
  group: today-live
  # Cancel any queued duplicate. With every-15-min cron + 5-min run time, this
  # prevents stale dispatches from queueing up if multiple cron firings land
  # close together. The currently-running build always wins.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/google-service-account.json
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      # Shopify creds for the Today ROAS Performance per-portal section.
      # Script tolerates missing values (orders/revenue render as 0 with a warning).
      SHOPIFY_STORE_URL:        ${{ secrets.SHOPIFY_STORE_URL }}
      SHOPIFY_ACCESS_TOKEN:     ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
      SHOPIFY_STORE_URL_SML:    ${{ secrets.SHOPIFY_STORE_URL_SML }}
      SHOPIFY_ACCESS_TOKEN_SML: ${{ secrets.SHOPIFY_ACCESS_TOKEN_SML }}
      SHOPIFY_STORE_URL_NBP:    ${{ secrets.SHOPIFY_STORE_URL_NBP }}
      SHOPIFY_ACCESS_TOKEN_NBP: ${{ secrets.SHOPIFY_ACCESS_TOKEN_NBP }}
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load ad account IDs + sheet IDs
        run: |
          grep -E '^[A-Z][A-Z0-9_]*=' config/accounts.env >> "$GITHUB_ENV"
          grep -E '^[A-Z][A-Z0-9_]*=' config/sheets.env   >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$GOOGLE_SERVICE_ACCOUNT_FILE"
          chmod 600 "$GOOGLE_SERVICE_ACCOUNT_FILE"

      - name: Restore state branch (gives us category_history.json from daily)
        uses: ./.github/actions/state-sync
        with:
          direction: restore

      - name: Run today_live_report
        id: today_live
        run: python3 scripts/today_live_report.py

      # The next 3 steps refresh secondary dashboards (NTN, KPI, Categories).
      # They hit Sheets heavily and occasionally fail with 429 read-quota errors.
      # continue-on-error keeps the workflow green so the Cloudflare deploy still
      # runs — the today_live dashboard the operator watches always gets fresh data.
      - name: Refresh KPI Daily (last 2 days — today + yesterday)
        if: ${{ steps.today_live.outcome == 'success' }}
        continue-on-error: true
        run: python3 scripts/kpi_daily_builder.py --days 2

      - name: Refresh Category Heads (--no-history, uses cached 7-day data)
        if: ${{ steps.today_live.outcome == 'success' }}
        continue-on-error: true
        run: python3 scripts/category_reports.py --no-history

      - name: Rebuild NTN dashboard with today's live data embedded
        if: ${{ steps.today_live.outcome == 'success' }}
        continue-on-error: true
        run: python3 scripts/auto_rebuild_dashboard.py

      - name: Build v2 categories dashboard from SQLite (if DB present)
        if: ${{ success() }}
        continue-on-error: true
        run: |
          if [ -f state/ntn.db ]; then
            mkdir -p out/v2
            python3 scripts/v2/build_dashboard.py --days 30 --out out/v2/categories.html || echo "v2 build failed (non-fatal)"
          else
            echo "state/ntn.db not present yet — skipping v2 dashboard"
          fi

      - name: Upload HTML dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: today-live-${{ github.run_id }}
          path: |
            out/today_live*.html
            out/ntn_filtered.html
            out/categories.html
          if-no-files-found: ignore
          retention-days: 7

      # ── Cloudflare Pages deploy (only if user has enabled it) ──────────────
      # The deploy is gated on a repository VARIABLE (not a secret) called
      # CLOUDFLARE_PAGES_PROJECT. Until the user sets it via the GitHub UI
      # (Settings → Secrets and variables → Actions → Variables), these steps
      # are silently skipped. Once set, every workflow run pushes a fresh build
      # to <project-name>.pages.dev.
      # always() is required — without it, GHA's default behavior skips this step
      # when ANY prior step failed (e.g. NTN-rebuild's Sheets read quota), even
      # though our `if` condition is otherwise true.
      - name: Prepare landing page (NTN as index.html, fallback to today_live)
        if: ${{ always() && vars.CLOUDFLARE_PAGES_PROJECT != '' && steps.today_live.outcome == 'success' }}
        run: |
          if [ -f out/ntn_filtered.html ]; then
            cp out/ntn_filtered.html out/index.html
          elif [ -f out/today_live.html ]; then
            # NTN rebuild failed (e.g., Sheets quota) — fall back so site root still loads.
            cp out/today_live.html out/index.html
          fi
          ls -la out/

      # Deploy as long as today_live succeeded — don't let a downstream NTN-rebuild
      # failure block the dashboard refresh that the operator actually watches.
      - name: Deploy to Cloudflare Pages
        if: ${{ always() && vars.CLOUDFLARE_PAGES_PROJECT != '' && steps.today_live.outcome == 'success' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true
