name: Today's Live Report (hourly, IST business hours)

on:
  schedule:
    # Every hour at the top of the hour UTC, between 04:00 and 14:00 UTC.
    # That's 09:30 IST through 19:30 IST inclusive — 11 runs per day.
    - cron: "0 4-14 * * *"
  workflow_dispatch:

concurrency:
  group: today-live
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/google-service-account.json
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TZ: Asia/Kolkata

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load ad account IDs + sheet IDs
        run: |
          grep -E '^[A-Z][A-Z0-9_]*=' config/accounts.env >> "$GITHUB_ENV"
          grep -E '^[A-Z][A-Z0-9_]*=' config/sheets.env   >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$GOOGLE_SERVICE_ACCOUNT_FILE"
          chmod 600 "$GOOGLE_SERVICE_ACCOUNT_FILE"

      - name: Run today_live_report
        run: python3 scripts/today_live_report.py

      - name: Refresh KPI Daily (last 2 days — today + yesterday)
        if: ${{ success() }}
        run: python3 scripts/kpi_daily_builder.py --days 2

      - name: Rebuild NTN dashboard with today's live data embedded
        if: ${{ success() }}
        run: python3 scripts/auto_rebuild_dashboard.py

      - name: Upload HTML dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: today-live-${{ github.run_id }}
          path: |
            out/today_live*.html
            out/ntn_filtered.html
          if-no-files-found: ignore
          retention-days: 7

      # ── Cloudflare Pages deploy (only if user has enabled it) ──────────────
      # The deploy is gated on a repository VARIABLE (not a secret) called
      # CLOUDFLARE_PAGES_PROJECT. Until the user sets it via the GitHub UI
      # (Settings → Secrets and variables → Actions → Variables), these steps
      # are silently skipped. Once set, every workflow run pushes a fresh build
      # to <project-name>.pages.dev.
      - name: Prepare landing page (NTN as index.html)
        if: ${{ vars.CLOUDFLARE_PAGES_PROJECT != '' && success() }}
        run: |
          [ -f out/ntn_filtered.html ] && cp out/ntn_filtered.html out/index.html
          ls -la out/

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CLOUDFLARE_PAGES_PROJECT != '' && success() }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true
