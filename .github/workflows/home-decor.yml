name: Home Decor (daily, 7 AM IST)

# Fires once a day at 01:30 UTC = 07:00 IST. Pulls every currently-ACTIVE
# campaign across all 3 portals live from Meta, keeps only home-decor items
# (derive_category_v2 == 'Crystal Home Decor': frames / miniatures / plates /
# clocks / idols / geodes — excludes bracelets/keyrings), and writes yesterday's
# budget / spend / ROAS product-wise to the operator's "home decor" sheet
# (1X0FDfiS5Z…), one new tab per day.
# See scripts/v2/home_decor_sheet.py.
#
# Note: GHA cron is best-effort — a delayed firing can land 10–30 min late under
# heavy queue load. Fine for a daily operator-facing snapshot.

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

concurrency:
  group: home-decor-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ github.workspace }}/google-service-account.json
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      TZ: Asia/Kolkata
      # Shopify stores — for the daily store-sales block (gross/net/#orders)
      SHOPIFY_STORE_URL:        ${{ secrets.SHOPIFY_STORE_URL }}
      SHOPIFY_ACCESS_TOKEN:     ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
      SHOPIFY_STORE_URL_SML:    ${{ secrets.SHOPIFY_STORE_URL_SML }}
      SHOPIFY_ACCESS_TOKEN_SML: ${{ secrets.SHOPIFY_ACCESS_TOKEN_SML }}
      SHOPIFY_STORE_URL_NBP:    ${{ secrets.SHOPIFY_STORE_URL_NBP }}
      SHOPIFY_ACCESS_TOKEN_NBP: ${{ secrets.SHOPIFY_ACCESS_TOKEN_NBP }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load ad account IDs
        run: grep -E '^[A-Z][A-Z0-9_]*=' config/accounts.env >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account file
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$GOOGLE_SERVICE_ACCOUNT_FILE"
          chmod 600 "$GOOGLE_SERVICE_ACCOUNT_FILE"

      - name: Build + push Home Decor report to the sheet
        run: python3 scripts/v2/home_decor_sheet.py
