name: keepalive (reliable 10-min dispatcher for v2-ingest)

# Why this exists: GitHub's own "*/10" schedule is best-effort and heavily
# throttled (observed firing only ~hourly, with multi-hour gaps). API-triggered
# workflow_dispatch is NOT throttled, so this workflow guarantees a real ~10-min
# cadence: it dispatches v2-ingest every 10 minutes (source=auto, so those ticks
# queue and never preempt a running ingest), then RE-ARMS itself so the chain
# continues without depending on the scheduler. A loose schedule backstop only
# restarts the chain if it ever dies.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # backstop only — restarts the chain if it broke

permissions:
  contents: read

concurrency:
  group: keepalive
  cancel-in-progress: true   # keep exactly one chain alive

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - name: Dispatch v2-ingest every 10 min, then re-arm
        env:
          PAT: ${{ secrets.KEEPALIVE_PAT }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PAT" ]; then
            echo "KEEPALIVE_PAT secret not set — cannot dispatch. Set it to a PAT with actions:write."
            exit 0
          fi
          dispatch() {
            # Retry transient GitHub failures (5xx / 429). A single 503 on the
            # re-arm call once killed the whole self-perpetuating chain, freezing
            # every downstream workflow for hours. 4xx is returned as-is — a 422
            # ("workflow does not have workflow_dispatch") is permanent.
            local code
            for attempt in 1 2 3 4; do
              code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: Bearer $PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/$1/dispatches" \
                -d "$2")
              case "$code" in
                5*|429) sleep $((attempt * 5)); continue ;;
                *) break ;;
              esac
            done
            echo "$code"
          }
          # 5 ticks x 10 min = ~50 min of coverage this run
          for i in 1 2 3 4 5; do
            code=$(dispatch v2-ingest.yml '{"ref":"main","inputs":{"source":"auto"}}')
            echo "tick $i/5 -> v2-ingest dispatched (HTTP $code) at $(date -u +%H:%M:%SZ)"
            # Live ROAS alert engine on the same reliable 10-min heartbeat — its own
            # cron was throttled to ~every 1.5-2h, defeating the 15-min/immediate rule.
            acode=$(dispatch camp-alerts.yml '{"ref":"main"}')
            echo "tick $i/5 -> camp-alerts dispatched (HTTP $acode)"
            # ROAS page + hourly email on the same 10-min heartbeat. Safe to fire
            # this often: the page rebuild is idempotent (it just gets fresher)
            # and the email is gated to one send per IST hour by its state file.
            # This is what makes the hourly page effectively unmissable even when
            # GitHub's own scheduler drops ticks.
            rcode=$(dispatch roas-email.yml '{"ref":"main"}')
            echo "tick $i/5 -> roas-email dispatched (HTTP $rcode)"
            # Live-ROAS dashboard snapshots on alternate ticks (~every 20 min):
            # its own 3x/hour cron was down to ~4 honored ticks in 15h, leaving
            # the dashboard hours stale. Upserts by hour-slot, so extra runs are
            # idempotent; alternate ticks keep Meta API load at the designed rate.
            if [ $((i % 2)) -eq 1 ]; then
              scode=$(dispatch camp-snapshots.yml '{"ref":"main"}')
              echo "tick $i/5 -> camp-snapshots dispatched (HTTP $scode)"
            fi
            if [ "$i" -lt 5 ]; then sleep 600; fi
          done
          # Re-arm the chain. This is the single point of failure for the whole
          # heartbeat, so it retries hard — if it does not land, nothing runs
          # until GitHub's own cron happens to fire. The schedule: below is the
          # backstop for exactly that case.
          code=""
          for attempt in 1 2 3 4 5 6; do
            code=$(dispatch keepalive.yml '{"ref":"main"}')
            echo "re-arm attempt $attempt -> HTTP $code"
            case "$code" in 2*) break ;; esac
            sleep $((attempt * 10))
          done
          case "$code" in
            2*) echo "re-armed OK" ;;
            *)  echo "::warning::re-arm failed after retries (HTTP $code) — relying on cron backstop" ;;
          esac
