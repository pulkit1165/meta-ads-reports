  const head='<tr>'+cols.map(c=>`<th class="${c.l?'l':''}" onclick="sortBy('${c.k}')">${c.t}</th>`).join('')+'</tr>';
  const body=rows.map(r=>'<tr>'+cols.map(c=>`<td class="${c.l?'l':''} ${c.cls?c.cls(r):''}">${c.f(r)}</td>`).join('')+'</tr>').join('');
